services:
  api:
    build:
      context: ./api
    container_name: customer-triage-api
    env_file:
      - ./api/.env
    ports:
      - "8000:8000"
    volumes:
      - ./api/data:/app/data
    restart: unless-stopped

  ui:
    build:
      context: ./ui
    container_name: customer-triage-ui
    env_file:
      - ./ui/.env
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped
