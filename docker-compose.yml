services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: 666127452756.dkr.ecr.eu-west-2.amazonaws.com/dev-mayds-triage-agent:latest_api_1  
    container_name: customer-triage-api
    env_file:
      - ./api/.env
    ports:
      - "8000:8000"
    volumes:
      - ./api/data:/app/data
    restart: unless-stopped

  ui:
    build:
      context: ./ui
    image: 666127452756.dkr.ecr.eu-west-2.amazonaws.com/dev-mayds-triage-agent:latest_ui_1
    container_name: customer-triage-ui
    environment:
      - API_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped
